name: Merge AI
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deduplicate_and_remove_empty_lines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get and merge domains from source files
        run: |
          set -uo pipefail

          declare -a urls=(
            "https://ruleset.skk.moe/List/non_ip/ai.conf"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list"
           
            "https://github.com/blackmatrix7/ios_rule_script/raw/refs/heads/master/rule/Surge/Claude/Claude.list"
            "https://raw.githubusercontent.com/EAlyce/conf/main/Rule/ai.list"
            
          )

          temp_file=$(mktemp)
          fail_count=0

          for url in "${urls[@]}"; do
            if [[ "$url" == *"whatshub.top"* ]]; then
              if ! curl -sSfL --retry 3 --retry-delay 2 -H "User-Agent: Mozilla/5.0" "$url" >> "$temp_file"; then
                echo "::warning::Failed to fetch $url"
                fail_count=$((fail_count + 1))
              fi
            else
              if ! curl -sSfL --retry 3 --retry-delay 2 "$url" >> "$temp_file"; then
                echo "::warning::Failed to fetch $url"
                fail_count=$((fail_count + 1))
              fi
            fi
            echo "" >> "$temp_file"
          done

          if [ "$fail_count" -eq "${#urls[@]}" ]; then
            echo "::error::All source URLs failed to fetch, aborting to avoid wiping the list"
            rm -f "$temp_file"
            exit 1
          fi

          mkdir -p Rule

          cat "$temp_file" |
            tr -d '\r' |
            tr -d ' \t' |
            grep -v '^#' |
            grep -v '^$' |
            sed 's/,no-resolve//g' |
            sed 's/#.*$//g' |
            sed 's/\/\/.*$//g' |
            sed '/^IP-CIDR,2[6-9]/s/^IP-CIDR/IP-CIDR6/' |
            sed 's/^DOMAIN-KEYWARD/DOMAIN-KEYWORD/g' |
            sed 's/^OMAIN,/DOMAIN,/g' |
            grep -Ev '^URL-REGEX|^PROCESS-NAME|^USER-AGENT|^IP-CIDR,13\.107\.0\.0/16' |
            awk -F',' '{
              prefix = toupper($1)
              if (prefix ~ /^IP-/) {
                print toupper($0) ",no-resolve"
              } else {
                print prefix "," tolower($2)
              }
            }' |
            sort -u > Rule/OpenAI.list.tmp

          if [ -s Rule/OpenAI.list.tmp ]; then
            mv Rule/OpenAI.list.tmp Rule/OpenAI.list
          else
            echo "::error::Generated list is empty, keeping previous version"
            rm -f Rule/OpenAI.list.tmp
            exit 1
          fi

          rm -f "$temp_file"

      - name: Remove DOMAIN-KEYWORD rules
        run: |
          sed -i '/^DOMAIN-KEYWORD/d' Rule/OpenAI.list

      - name: Check and Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Force add changes
        run: git add Rule/OpenAI.list

      - name: Commit and push changes if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --cached --quiet; then
            git commit -m "Auto Update OpenAI.list ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
